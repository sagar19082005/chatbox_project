<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChatBox — Chat</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="chat-container">
      <header id="roomHeader"></header>
      <div id="messages" class="messages"></div>

      <div id="adminPanel" style="display:none;margin-bottom:12px;padding:8px;border:1px solid #eee;background:#fafafa">
        <h3>Admin Panel</h3>
        <div style="margin-bottom:8px">
          <label>Admin Token: </label>
          <input id="adminTokenDisplay" style="width:60%" readonly />
        </div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="kickTarget" placeholder="Display name to kick" />
          <button id="kickBtn">Kick User</button>
        </div>
        <div>
          <button id="deleteMsgsBtn">Delete All Messages</button>
        </div>
      </div>

      <form id="msgForm">
        <input id="msgInput" autocomplete="off" placeholder="Type a message..." />
        <button>Send</button>
      </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/chat.js"></script>
  </body>
</html>
