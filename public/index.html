<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChatBox — Create / Join</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="container">
      <h1>ChatBox</h1>
      <section>
        <h2>Create Group</h2>
        <form id="createForm">
          <input name="groupName" placeholder="Group name" required />
          <input name="password" placeholder="Password" type="password" required />
          <button>Create</button>
        </form>
      </section>

      <section>
        <h2>Join Group</h2>
        <form id="joinForm">
          <input name="groupName" placeholder="Group name" required />
          <input name="password" placeholder="Password" type="password" required />
          <input name="displayName" placeholder="Display name (nickname)" />
          <button>Join</button>
        </form>
      </section>
    </div>

    <script src="/js/main.js"></script>
  </body>
</html>
